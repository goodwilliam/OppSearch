<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunities</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    header span { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

    nav a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }

    .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    #count { font-weight: 600; color: #111; }

    .cards { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      align-items: start;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      grid-column: 1;
    }

    .card-company {
      font-size: 13px;
      color: #555;
      grid-column: 1;
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      grid-column: 1;
    }

    .pill {
      background: #f0f0ee;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: #444;
    }

    .pill.source { background: #e8f0fe; color: #1a56c4; }

    .card-right {
      grid-column: 2;
      grid-row: 1 / 4;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      white-space: nowrap;
    }

    .date-added {
      font-size: 12px;
      color: #999;
    }

    .btn {
      display: inline-block;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #999;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header>
    <span>OppSearch</span>
    <nav>
      <a href="index.html" class="active">Opportunities</a>
      &nbsp;&nbsp;
      <a href="raw.html">Raw data</a>
    </nav>
  </header>

  <div class="container">
    <h1>Opportunities</h1>
    <p class="subtitle">Keyword-matched listings. <span id="count">—</span> total.</p>
    <div class="cards" id="cards"></div>
  </div>

  <script>
    function formatDate(iso) {
      const d = new Date(iso + "T12:00:00Z");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    fetch("data/opportunities.json")
      .then(r => r.json())
      .then(jobs => {
        document.getElementById("count").textContent = jobs.length;

        if (!jobs.length) {
          document.getElementById("cards").innerHTML =
            '<div class="empty">No opportunities yet. Run the scraper first.</div>';
          return;
        }

        document.getElementById("cards").innerHTML = jobs.map(j => `
          <div class="card">
            <div class="card-title">${j.title}</div>
            <div class="card-company">${j.company}</div>
            <div class="card-meta">
              ${j.hours ? `<span class="pill">${j.hours}</span>` : ""}
              ${j.rate ? `<span class="pill">${j.rate}</span>` : ""}
              ${j.location ? `<span class="pill">${j.location}</span>` : ""}
              <span class="pill source">${j.source}</span>
            </div>
            <div class="card-right">
              <div class="date-added">Added ${formatDate(j.date_scraped)}</div>
              <a class="btn" href="${j.url}" target="_blank" rel="noopener">View →</a>
            </div>
          </div>
        `).join("");
      });
  </script>
</body>
</html>
