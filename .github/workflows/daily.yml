name: Daily Scrape

on:
  schedule:
    - cron: "0 8 * * *"  # 8am UTC daily
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 cloudscraper

      - name: Set up OpenPostings
        run: |
          git clone --depth=1 https://github.com/Masterjx9/OpenPostings /tmp/openpostings
          # Replace the full React Native package.json with minimal server-only deps
          echo '{"name":"op-server","version":"1.0.0","dependencies":{"express":"^5.2.1","cors":"^2.8.6","sqlite":"^5.1.1","sqlite3":"^6.0.1"}}' > /tmp/openpostings/package.json
          cd /tmp/openpostings && npm install
          curl -sL -o /tmp/openpostings/jobs.db https://raw.githubusercontent.com/Masterjx9/OpenPostings/main/jobs.db
          python3 openpostings_setup.py

      - name: Run OpenPostings sync
        timeout-minutes: 90
        run: |
          cd /tmp/openpostings
          SYNC_INTERVAL_MS=999999999 SYNC_WORKER_CONCURRENCY=10 node server/index.js &
          SERVER_PID=$!

          # Wait for server to be ready (up to 60s)
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:8787/sync/status > /dev/null 2>&1; then
              echo "Server ready after $((i*2))s"; break
            fi
          done

          # Trigger sync and wait for completion
          curl -sf -X POST "http://localhost:8787/sync/ats?wait=true" --max-time 5400 || true

          kill $SERVER_PID 2>/dev/null || true

      - name: Run scrapers
        run: |
          python3 scraper.py
          python3 scraper_gofractional.py
          python3 ats_scraper.py
          python3 scraper_hn.py
          python3 scraper_openpostings.py

      - name: Commit and push results
        run: |
          git config user.name "OppSearch Bot"
          git config user.email "bot@oppsearch"
          git add docs/data/
          git diff --cached --quiet || git commit -m "scrape: $(date -u '+%Y-%m-%d')"
          git push
