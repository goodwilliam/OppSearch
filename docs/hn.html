<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Who's Hiring</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    header span { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

    nav a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }

    .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }

    .page-header { margin-bottom: 28px; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; }
    .subtitle a { color: #666; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      height: 36px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #111;
      outline: none;
      width: 240px;
    }
    input[type="text"]:focus { border-color: #111; }

    .result-count { font-size: 13px; color: #888; margin-left: auto; }

    .cards { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 18px 22px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 10px;
    }

    .card-firstline {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
      flex: 1;
      line-height: 1.4;
    }

    .card-date {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
      padding-top: 2px;
    }

    .card-text {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .thread-badge {
      background: #fff4e5;
      color: #b35900;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .remote-badge {
      background: #e8f4fd;
      color: #0a6fa8;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .btn {
      display: inline-block;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #999;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header>
    <span>OppSearch</span>
    <nav>
      <a href="index.html">Opportunities</a>
      &nbsp;&nbsp;
      <a href="jobs.html">Jobs</a>
      &nbsp;&nbsp;
      <a href="hn.html" class="active">HN Hiring</a>
      &nbsp;&nbsp;
      <a href="raw.html">Raw data</a>
    </nav>
  </header>

  <div class="container">
    <div class="page-header">
      <h1>HN Who's Hiring</h1>
      <p class="subtitle">
        Design + remote roles from <a href="https://news.ycombinator.com/item?id=47601859" target="_blank">Ask HN: Who is hiring?</a> — updated daily as new comments come in.
      </p>
    </div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search company or role…">
      <span class="result-count" id="resultCount"></span>
    </div>

    <div class="cards" id="cards"></div>
  </div>

  <script>
    let allJobs = [];

    function formatDate(iso) {
      const d = new Date(iso + "T12:00:00Z");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function render() {
      const search = document.getElementById("search").value.toLowerCase();
      const filtered = allJobs.filter(j => {
        if (search && !j.first_line.toLowerCase().includes(search) && !j.text.toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById("resultCount").textContent = `${filtered.length} of ${allJobs.length}`;

      if (!filtered.length) {
        document.getElementById("cards").innerHTML = '<div class="empty">No results.</div>';
        return;
      }

      document.getElementById("cards").innerHTML = filtered.map(j => `
        <div class="card">
          <div class="card-top">
            <div class="card-firstline">${escHtml(j.first_line)}</div>
            <div class="card-date">${j.posted ? formatDate(j.posted) : ""}</div>
          </div>
          <div class="card-footer">
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <span class="thread-badge">${escHtml(j.thread_title)}</span>
              <span class="remote-badge">Remote</span>
            </div>
            <a class="btn" href="${j.url}" target="_blank" rel="noopener">View on HN →</a>
          </div>
        </div>
      `).join("");
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    fetch("data/hn_jobs.json")
      .then(r => r.json())
      .then(jobs => {
        allJobs = jobs.sort((a, b) => (b.posted || "").localeCompare(a.posted || ""));
        document.getElementById("resultCount").textContent = `${jobs.length} of ${jobs.length}`;
        document.getElementById("search").addEventListener("input", render);
        render();
      });
  </script>
</body>
</html>
