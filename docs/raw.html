<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raw Data</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    header span { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

    nav a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, input[type="text"] {
      height: 36px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #111;
      outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: #111; }

    input[type="text"] { width: 220px; }

    .toggle-group {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }

    .toggle-group button {
      height: 36px;
      padding: 0 14px;
      border: none;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: background 0.12s, color 0.12s;
    }
    .toggle-group button.active { background: #111; color: #fff; }
    .toggle-group button + button { border-left: 1px solid #ddd; }

    .result-count { font-size: 13px; color: #888; margin-left: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 12px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    tbody tr.flagged { background: #f0fff4; }
    tbody tr.flagged:hover { background: #e6ffee; }

    td { padding: 11px 14px; vertical-align: middle; }

    td.flag-col { text-align: center; font-size: 16px; }

    td.title-col { font-weight: 500; max-width: 240px; }

    td.company-col { color: #555; max-width: 160px; }

    .source-badge {
      background: #e8f0fe;
      color: #1a56c4;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .date-col { color: #999; white-space: nowrap; }

    a.view-link {
      color: #1a56c4;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }
    a.view-link:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #999;
      font-size: 15px;
    }

    .truncate {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <header>
    <span>OppSearch</span>
    <nav>
      <a href="index.html">Opportunities</a>
      &nbsp;&nbsp;
      <a href="jobs.html">Jobs</a>
      &nbsp;&nbsp;
      <a href="raw.html" class="active">Raw data</a>
    </nav>
  </header>

  <div class="container">
    <h1>Raw data</h1>
    <p class="subtitle">Everything scraped. Use this to spot titles we're missing and adjust keywords.</p>

    <div class="toolbar">
      <select id="sourceFilter"><option value="">All sources</option></select>
      <input type="text" id="search" placeholder="Search title or company…">
      <div class="toggle-group">
        <button class="active" data-filter="all" onclick="setFlagFilter('all', this)">All</button>
        <button data-filter="flagged" onclick="setFlagFilter('flagged', this)">Flagged ✓</button>
        <button data-filter="missed" onclick="setFlagFilter('missed', this)">Not flagged</button>
      </div>
      <span class="result-count" id="resultCount"></span>
    </div>

    <table>
      <thead>
        <tr>
          <th>✓</th>
          <th>Title</th>
          <th>Company</th>
          <th>Hours</th>
          <th>Rate</th>
          <th>Location</th>
          <th>Category</th>
          <th>Source</th>
          <th>Added</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    let allJobs = [];
    let flagFilter = "all";

    function formatDate(iso) {
      const d = new Date(iso + "T12:00:00Z");
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function setFlagFilter(val, btn) {
      flagFilter = val;
      document.querySelectorAll(".toggle-group button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function render() {
      const source = document.getElementById("sourceFilter").value;
      const search = document.getElementById("search").value.toLowerCase();

      const filtered = allJobs.filter(j => {
        if (source && j.source !== source) return false;
        if (flagFilter === "flagged" && !j.flagged) return false;
        if (flagFilter === "missed" && j.flagged) return false;
        if (search && !j.title.toLowerCase().includes(search) && !j.company.toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById("resultCount").textContent = `${filtered.length} of ${allJobs.length}`;

      if (!filtered.length) {
        document.getElementById("tbody").innerHTML =
          `<tr><td colspan="10"><div class="empty">No results.</div></td></tr>`;
        return;
      }

      document.getElementById("tbody").innerHTML = filtered.map(j => `
        <tr class="${j.flagged ? "flagged" : ""}">
          <td class="flag-col">${j.flagged ? "✓" : ""}</td>
          <td class="title-col truncate" style="max-width:220px" title="${j.title}">${j.title}</td>
          <td class="company-col truncate" style="max-width:140px" title="${j.company}">${j.company}</td>
          <td>${j.hours || "—"}</td>
          <td>${j.rate || "—"}</td>
          <td class="truncate" style="max-width:160px" title="${j.location}">${j.location || "—"}</td>
          <td>${j.category || "—"}</td>
          <td><span class="source-badge">${j.source}</span></td>
          <td class="date-col">${j.date_scraped ? formatDate(j.date_scraped) : "—"}</td>
          <td><a class="view-link" href="${j.url}" target="_blank" rel="noopener">View →</a></td>
        </tr>
      `).join("");
    }

    fetch("data/raw_all.json")
      .then(r => r.json())
      .then(jobs => {
        allJobs = jobs;

        // Populate source filter
        const sources = [...new Set(jobs.map(j => j.source))];
        const sel = document.getElementById("sourceFilter");
        sources.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          sel.appendChild(opt);
        });

        document.getElementById("sourceFilter").addEventListener("change", render);
        document.getElementById("search").addEventListener("input", render);
        render();
      });
  </script>
</body>
</html>
